// ─────────────────────────────────────────────────────────────
// HELPERS DE TEMPO
// ─────────────────────────────────────────────────────────────
function toMin(hhmm) {
    if (!hhmm) return 0;
    const [h, m] = hhmm.split(':').map(Number);
    return (h || 0) * 60 + (m || 0);
}

function fromMin(mins) {
    return `${String(Math.floor(mins / 60)).padStart(2, '0')}:${String(mins % 60).padStart(2, '0')}`;
}

// Aplica 24h+ para turnos noturnos
function nocturnalFmt(times) {
    if (!times.length) return times;
    let out = [], offset = 0, prev = -1;
    for (const t of times) {
        let m = toMin(t) + offset;
        if (prev !== -1 && m < prev) { offset += 1440; m += 1440; }
        prev = m;
        out.push(fromMin(m));
    }
    return out;
}

    "OUTUBRO","NOVEMBRO","DEZEMBRO"
]);

function isValidName(str) {
    let c = str.replace(CARGO_RE, '').trim()
               .replace(/[0-9.:\-\/\|\\@#%&*()_+=\[\]{}<>]/g, '').trim()
               .replace(/\s{2,}/g, ' ').trim();
    const w = c.split(/\s+/).filter(x => x.length > 1);
    if (w.length < 2) return null;
    if (!w.every(x => x === x.toUpperCase() && /[A-ZÁÉÍÓÚÃÕÂÊÎÔÛÀÈÌÒÙÇ]/.test(x))) return null;
    if (w.some(x => BL.has(x.toUpperCase()))) return null;
    if (!w.some(x => x.length >= 3)) return null;
    return c;
}

// ─────────────────────────────────────────────────────────────
// LEITURA DO PDF — retorna estrutura por página com coordenadas
// ─────────────────────────────────────────────────────────────
async function extractPDFData(file) {
    const pdf   = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
    const pages = [];

    for (let p = 1; p <= pdf.numPages; p++) {
        const page    = await pdf.getPage(p);
        const content = await page.getTextContent();

        const lineMap = new Map();
        for (const item of content.items) {
            const y = Math.round(item.transform[5]);
            const x = Math.round(item.transform[4]);
            const s = item.str.trim();
            if (!s) continue;

            let key = null;
            for (const k of lineMap.keys()) {
                if (Math.abs(k - y) <= 4) { key = k; break; }
            }
            if (key === null) { key = y; lineMap.set(key, []); }
            lineMap.get(key).push({ x, s });
        }

        const lines = [...lineMap.entries()]
            .sort((a, b) => b[0] - a[0])
            .map(([y, items]) => ({
                y,
                items: items.sort((a, b) => a.x - b.x)
            }));

        pages.push(lines);
    }
    return pages;
}

function detectColumnBoundary(lines) {
    for (const line of lines) {
        const text = line.items.map(i => i.s).join(' ');
        if (/\bEnt[1-4]\b/i.test(text) || /\bSai[1-4]\b/i.test(text)) {
            const pipeItem = line.items.find(i => i.s === '|');
            const trabItem = line.items.find(i => /^Trab$/i.test(i.s));
            const boundary = pipeItem?.x ?? trabItem?.x ?? null;
            if (boundary) return boundary;

            const saiItems = line.items.filter(i => /^Sai\d$/i.test(i.s));
            if (saiItems.length) return saiItems[saiItems.length - 1].x + 60;
        }
    }
    return null;
}

// ─────────────────────────────────────────────────────────────
// PROCESSAMENTO POR PÁGINA COM AGRUPAMENTO DE LINHAS (DRIFT)
// ─────────────────────────────────────────────────────────────
function processPage(lines) {
    const xBoundary = detectColumnBoundary(lines);
    const records   = [];

    let currentDayItems = [];
    let currentDate = null;
    let currentDayStr = '';
    let inBody = false;

    function finalizeDay() {
        if (currentDate && currentDayItems.length > 0) {
            // Reordena todos os itens agrupados horizontalmente
            currentDayItems.sort((a, b) => a.x - b.x);

            // Filtra os itens ignorando atrasos/horas extras (depois do limite)
            const validItems = xBoundary !== null
                ? currentDayItems.filter(i => i.x < xBoundary)
                : currentDayItems;

            // Junta tudo num texto só para evitar cortes do PDF (ex: '23:' e '59')
            const text = validItems.map(i => i.s).join(' ');

            // Procura todos os horários (com ou sem '+')
            const rawTimesMatches = text.match(/\+?(?:[01]\d|2[0-3]):[0-5]\d/g) || [];

            // Limpa os sinais de '+'
            let cleanTimes = rawTimesMatches.map(t => t.replace('+', ''));

            // Se for ímpar e não houver limite seguro, apara a última (Total)
            if (xBoundary === null && cleanTimes.length % 2 !== 0 && cleanTimes.length > 0) {
                cleanTimes = cleanTimes.slice(0, -1);
            }

            const times = nocturnalFmt(cleanTimes.slice(0, 4));
            records.push({ date: currentDate, day: currentDayStr, times });
        }
        
        currentDayItems = [];
        currentDate = null;
        currentDayStr = '';
    }

    for (const line of lines) {
        const fullText = line.items.map(i => i.s).join(' ');

        if (/\bEnt1\b/i.test(fullText)) { inBody = true; continue; }
        if (END_MARKERS.some(re => re.test(fullText))) { finalizeDay(); break; }
        if (!inBody) continue;

        // Captura Data no formato DD/MM/AAAA (garantido com \b)
        const dateMatch = fullText.match(/\b\d{2}\/\d{2}\/\d{4}\b/);

        if (dateMatch) {
            finalizeDay();
            currentDate = dateMatch[0];
            const dayMatch = fullText.match(/\b(SEG|TER|QUA|QUI|SEX|SAB|DOM)\b/i);
            currentDayStr = dayMatch ? dayMatch[1].toUpperCase() : '';
            currentDayItems.push(...line.items);
        } else if (currentDate) {
            // Se quebrou de linha, anexa os itens à data atual
            currentDayItems.push(...line.items);
        }
    }
    finalizeDay(); // Salva o último dia

    return records;
}

// ─────────────────────────────────────────────────────────────
// BUSCA DE NOME NA PÁGINA
// ─────────────────────────────────────────────────────────────
function findNameInLines(lines) {
    for (let i = 0; i < lines.length; i++) {
        const text = lines[i].items.map(x => x.s).join(' ');
        if (/nome\s+do\s+funcion[aá]rio/i.test(text)) {
            for (let j = i + 1; j < Math.min(i + 10, lines.length); j++) {
                const candidate = lines[j].items.map(x => x.s).join(' ');
                const valid = isValidName(candidate);
                if (valid) return valid;
            }
        }
    }
    for (let i = 0; i < Math.min(lines.length, 60); i++) {
        const valid = isValidName(lines[i].items.map(x => x.s).join(' '));
        if (valid) return valid;
    }
    return null;
}

// ─────────────────────────────────────────────────────────────
// PIPELINE PRINCIPAL
// ─────────────────────────────────────────────────────────────
async function processPDFs() {
    const fileInput  = document.getElementById('pdf-upload');
    const btnProcess = document.getElementById('btn-process');
    const loading    = document.getElementById('loading-indicator');
    const wrap       = document.getElementById('progress-wrap');
    const bar        = document.getElementById('progress-bar');
    const label      = document.getElementById('progress-label');

    document.getElementById('error-box').style.display        = 'none';
    document.getElementById('processing-area').style.display  = 'none';
    document.getElementById('found-badge').style.display      = 'none';
    globalEmployees = [];

    if (!fileInput.files.length) { showError('Selecione pelo menos um PDF.'); return; }

    btnProcess.disabled   = true;
    loading.style.display = 'inline-block';
    wrap.style.display    = 'block';
    bar.style.width       = '0%';

    try {
        let monthDetected = false;
        const files = [...fileInput.files];
        const total = files.length;

        for (let fi = 0; fi < total; fi++) {
            const file = files[fi];
            label.textContent = `Lendo arquivo ${fi + 1} de ${total}: ${file.name}`;
            bar.style.width   = `${Math.round((fi / total) * 80)}%`;

            const pages = await extractPDFData(file);

            if (!monthDetected) {
                const allText = pages
                    .flatMap(p => p)
                    .map(l => l.items.map(i => i.s).join(' '))
                    .join('\n');
                const mm = allText.match(/Emiss[ãa]o:\s*([A-Za-zçÇ]+\/\d{4})/i);
                if (mm) {
                    globalFileName = `Cartões de ponto - ${mm[1].replace('/', '-')}.xlsx`;
                    monthDetected  = true;
                }
            }

            for (const lines of pages) {
                const rawName = findNameInLines(lines);
                if (!rawName) continue;

                const listed = matchInList(rawName);
                if (!listed) continue;

                const records = processPage(lines);
                if (!records.length) continue;

                mergeEmployee(listed, records);
            }
        }

        label.textContent = 'Finalizando...';
        bar.style.width   = '100%';
        await new Promise(r => setTimeout(r, 400));

        if (!globalEmployees.length) {
            showError('Nenhum funcionário da lista interna foi encontrado nos PDFs.');
            return;
        }

        globalEmployees.sort((a, b) => a.name.localeCompare(b.name));
        renderVisuals();
        document.getElementById('processing-area').style.display = 'block';

        const badge       = document.getElementById('found-badge');
        badge.textContent = `✓ ${globalEmployees.length} funcionário(s) encontrado(s) nos PDFs.`;
        badge.style.display = 'block';

    } catch (e) {
        console.error(e);
        // Exibe o erro exato na tela em vez de um texto genérico
        showError('Erro ao processar arquivo: ' + (e.message || 'Verifique se não está protegido ou corrompido.'));
    } finally {
        btnProcess.disabled   = false;
        loading.style.display = 'none';
        wrap.style.display    = 'none';
    }
}

// ─────────────────────────────────────────────────────────────
// MERGE
// ─────────────────────────────────────────────────────────────
function mergeEmployee(name, records) {
    const sortFn = (a, b) => {
        const [da, ma, ya] = a.date.split('/');
        const [db, mb, yb] = b.date.split('/');
        return new Date(ya, ma - 1, da) - new Date(yb, mb - 1, db);
    };

    const idx = globalEmployees.findIndex(e => e.name === name);
    if (idx === -1) {
        globalEmployees.push({ name, records: records.sort(sortFn) });
        return;
    }
    const ex = globalEmployees[idx];
    for (const r of records) {
        const found = ex.records.find(er => er.date === r.date);
        if (!found) {
            ex.records.push(r);
        } else if (r.times.length > found.times.length) {
            found.times = r.times;
            if (!found.day && r.day) found.day = r.day;
        }
    }
    ex.records.sort(sortFn);
}

// ─────────────────────────────────────────────────────────────
// RENDERIZAÇÃO
// ─────────────────────────────────────────────────────────────
function renderVisuals() {
    let html = '';
    for (const emp of globalEmployees) {
        html += `<div class="person-block">
            <div class="person-title">${emp.name}</div>
            <table class="tbl">
                <thead>
                    <tr><th>Data</th><th>Dia</th><th>E1</th><th>S1</th><th>E2</th><th>S2</th></tr>
                </thead>
                <tbody>`;
        for (const r of emp.records) {
            const t   = r.times;
            const fmt = v => v ? (parseInt(v) >= 24 ? `<span class="nocturnal">${v}</span>` : v) : '-';
            if (!t.length) {
                html += `<tr>
                    <td>${r.date}</td><td>${r.day}</td>
                    <td colspan="4" class="empty-day">Sem batidas</td>
                </tr>`;
            } else {
                html += `<tr>
                    <td>${r.date}</td><td>${r.day}</td>
                    <td>${fmt(t[0])}</td><td>${fmt(t[1])}</td>
                    <td>${fmt(t[2])}</td><td>${fmt(t[3])}</td>
                </tr>`;
            }
        }
        html += `</tbody></table></div>`;
    }
    document.getElementById('visual-area').innerHTML = html;
    document.getElementById('names-list').value = globalEmployees.map(e => e.name).join('\n');
}

// ─────────────────────────────────────────────────────────────
// EXPORTAÇÃO EXCEL
// ─────────────────────────────────────────────────────────────
function generateExcel() {
    const filter = document.getElementById('names-list').value.trim();
    if (!filter) { alert('A caixa de nomes está vazia.'); return; }

    const targets = filter.split('\n').map(n => n.trim().toUpperCase()).filter(n => n);
    const sel     = globalEmployees.filter(emp => {
        const up = emp.name.toUpperCase();
        return targets.some(t => up.includes(t) || t.includes(up));
    });
    if (!sel.length) { alert('Nenhum funcionário encontrado. Verifique os nomes.'); return; }

    const wb = XLSX.utils.book_new();
    for (const emp of sel) {
        const ws = XLSX.utils.aoa_to_sheet([
            ['Funcionário:', emp.name],
            [],
            ['Data', 'Dia', 'Ent1', 'Sai1', 'Ent2', 'Sai2'],
            ...emp.records.map(r => [
                r.date, r.day,
                r.times[0] || '', r.times[1] || '',
                r.times[2] || '', r.times[3] || ''
            ])
        ]);
        ws['!cols'] = [{wch:12},{wch:6},{wch:8},{wch:8},{wch:8},{wch:8}];
        let sn = emp.name.replace(/[\\\/\?\*\[\]]/g, '').substring(0, 31);
        if (wb.SheetNames.includes(sn)) sn = sn.substring(0, 27) + '_' + Math.floor(Math.random() * 100);
        XLSX.utils.book_append_sheet(wb, ws, sn);
    }
    XLSX.writeFile(wb, globalFileName);
}
